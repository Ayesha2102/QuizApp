<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="q.css" type="text/css" />
    <title>Quiz App</title>
</head>

<body>
    <!-- main  page creation -->

    <div id="mainPage">
        <div id="welcome_section">
            <div class="logo">
                <img src="testbook logo.png" alt="logo-img" />
            </div>

            <div class="heading">
                <h2 class="heading_style">Welcome to the Test Book Quiz App</h2>
                <h3>Enter your name to continue the quiz.</h3>
            </div>


            <div class="user_info">
                <input type="text" class="input_value" name="value" required placeholder="Enter Your Name"
                    autocomplete="off" />
                <button type="button" class="enter_btn" onclick="printname()"> Enter </button>
            </div>


            <div class="message_area">
                <h4>
                    <div id="user_message"></div>
                    You'll have 10 seconds to answer each question.
                </h4>
                <h2 class="heading_style">Select Category</h2>
            </div>


            <!-- category button for each category -->
            <div class="category_section">
                <div class="category_button">
                    <button type="button" class="questionsCategory" data-category="probability"> Probability

                    </button>
                    <button type="button" class="questionsCategory" data-category="Pipes and Cisterns"> Pipes and
                        Cisterns</button>
                    <button type="button" class="questionsCategory" data-category="Problems On Age"> Problems On Age
                    </button>
                    <button type="button" class="questionsCategory" data-category="Profit And Loss"> Profit And Loss
                    </button>
                </div>
            </div>


        </div>
    </div>
    <!-- main page end -->
